apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
  namespace: gitops-app
  labels:
    app: gitops-app
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gitops-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gitops-app
        version: v1
    spec:
      serviceAccountName: gitops-app
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: gitops-app
        image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/gitops-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/items/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/items/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
