version: '3.8'

services:
  gitops-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/items/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
