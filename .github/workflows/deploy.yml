name: Update GitOps Config and Deploy

on:
  workflow_run:
    workflows: ["Build and Push to ECR"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - name: Checkout GitOps config repository
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/gitops-config
        token: ${{ secrets.GITHUB_TOKEN }}
        path: gitops-config

    - name: Download artifact
      uses: actions/github-script@v7
      with:
        script: |
          let allArtifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
          });
          let matchArtifact = allArtifacts.data.artifacts.filter((artifact) => {
            return artifact.name == "image-uri"
          })[0];
          let download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: matchArtifact.id,
              archive_format: 'zip',
          });
          let fs = require('fs');
          fs.writeFileSync(`${process.env.GITHUB_WORKSPACE}/image_uri.zip`, Buffer.from(download.data));

    - name: Unzip artifact
      run: unzip image_uri.zip

    - name: Read image URI
      id: image
      run: echo "URI=$(cat image_uri.txt)" >> $GITHUB_OUTPUT

    - name: Update deployment manifest
      run: |
        cd gitops-config
        sed -i 's|image: .*|image: ${{ steps.image.outputs.URI }}|g' overlays/prod/deployment.yaml
        cat overlays/prod/deployment.yaml

    - name: Commit and push changes
      run: |
        cd gitops-config
        git config --global user.email "github-actions[bot]@github.com"
        git config --global user.name "GitHub Actions Bot"
        git add overlays/prod/deployment.yaml
        git commit -m "Update image to ${{ steps.image.outputs.URI }}" || echo "No changes to commit"
        git push

    - name: Notify deployment
      run: echo "GitOps config updated. ArgoCD will automatically deploy the changes to EKS."
